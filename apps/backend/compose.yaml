# See https://docs.docker.com/language/nodejs/
services:
  server:
    build:
      context: ../.. # monorepo root
      dockerfile: apps/backend/Dockerfile
      target: development
    environment:
      NODE_ENV: development
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    ports:
      - 4000:4000
    volumes:
      - ./src:/usr/src/app/apps/backend/src
      - ./tsconfig.json:/usr/src/app/apps/backend/tsconfig.json
    develop:
      watch:
        - action: sync
          path: ./src
          target: /usr/src/app/apps/backend/src
          ignore:
            - node_modules/
        - action: sync+restart
          path: ./tsconfig.json
          target: /usr/src/app/apps/backend/tsconfig.json
        - action: rebuild
          path: package.json
